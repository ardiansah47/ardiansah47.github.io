name: Deploy to GitHub Pages

on:
  # Build & deploy on every push to main
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the GitHub Pages deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Let in-progress runs finish; queue (don't cancel) new ones
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build # next build -> static export in ./out
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
